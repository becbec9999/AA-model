<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大类资产配置指标监控</title>
    <!-- Font preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/css/style.css?v=20260418">
    <link rel="stylesheet" href="/static/css/animations.css?v=20260414">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23161b22'/><path d='M6 22 L10 14 L14 18 L18 10 L22 16 L26 8' stroke='%2358a6ff' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <script src="/static/js/plotly.min.js"></script>
</head>
<body>
    <!-- 工具栏 - 工业控制面板 -->
    <header class="toolbar">
        <div class="toolbar-section toolbar-brand">
            <div class="brand-logo">
                <svg class="logo-icon" viewBox="0 0 24 24">
                    <path d="M3 12h3v7h3v-7h3V9H3zm15-5h-3v9h3v4h3v-4h3V7h-3z"/>
                </svg>
                <span class="brand-name">AA-Model</span>
                <span class="brand-tag">量化分析</span>
            </div>
        </div>

        <div class="toolbar-section toolbar-controls">
            <!-- 时间范围选择器 -->
            <div class="time-range-selector">
                <div class="range-presets">
                    <button class="range-preset active" data-range="1M">1M</button>
                    <button class="range-preset" data-range="3M">3M</button>
                    <button class="range-preset" data-range="6M">6M</button>
                    <button class="range-preset" data-range="YTD">YTD</button>
                    <button class="range-preset" data-range="1Y">1Y</button>
                    <button class="range-preset" data-range="2Y">2Y</button>
                    <button class="range-preset" data-range="3Y">3Y</button>
                    <button class="range-preset" data-range="5Y">5Y</button>
                    <button class="range-preset" data-range="ALL">All</button>
                </div>
                <div class="range-custom">
                    <input type="date" id="customStartDate" class="date-input">
                    <span class="date-separator">—</span>
                    <input type="date" id="customEndDate" class="date-input">
                    <button id="applyCustomRange" class="apply-custom">应用</button>
                </div>
            </div>

            <!-- 数据状态指示器 -->
            <div class="data-status">
                <span class="last-update" id="updateTime">更新: 加载中...</span>
            </div>
        </div>

        <div class="toolbar-section toolbar-actions">
            <button class="toolbar-btn" title="刷新数据" onclick="location.reload()">
                <svg class="icon-refresh" viewBox="0 0 24 24">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </button>
            <button class="toolbar-btn" title="导出图表">
                <svg class="icon-export" viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
            </button>
            <button class="toolbar-btn" title="设置">
                <svg class="icon-settings" viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 侧边栏 - 工业导航面板 -->
        <aside class="sidebar">
            <!-- 搜索和筛选 -->
            <div class="sidebar-search">
                <input type="text" class="search-input" placeholder="搜索指标...">
                <button class="search-clear">×</button>
            </div>

            <!-- 指标分类容器 -->
            <div class="sidebar-section" id="indicatorNav">
                <!-- 动态生成指标导航 -->
            </div>
        </aside>

        <!-- 主内容 - 工业工作区 -->
        <main class="content">
            <!-- 图表标题区域 -->
            <div class="chart-header">
                <div class="chart-title-section">
                    <h2 class="chart-main-title" id="chartTitle">选择指标查看</h2>
                    <div class="chart-subtitle">
                        <span class="chart-period" id="chartPeriod">全部历史</span>
                        <div class="chart-stats" id="chartStats">
                            <!-- 动态生成统计信息 -->
                        </div>
                    </div>
                </div>
                <div class="chart-controls">
                    <div class="chart-legend" id="chartLegend">
                        <!-- 动态生成图例 -->
                    </div>
                    <!-- 滚动窗口选择器 -->
                    <div class="chart-window-selector" title="标准差/均线计算窗口期">
                        <span class="window-label">σ/均线窗口:</span>
                        <button class="window-btn" data-window="6M">6M</button>
                        <button class="window-btn active" data-window="1Y">1Y</button>
                        <button class="window-btn" data-window="3Y">3Y</button>
                        <button class="window-btn" data-window="5Y">5Y</button>
                        <button class="window-btn" data-window="ALL">ALL</button>
                        <button class="window-btn stats-toggle-btn active" id="statsOverlayToggle" title="切换均线与标准差叠加">
                            叠加层: 开
                        </button>
                    </div>
                    <div class="chart-actions">
                        <button class="chart-btn" title="全屏查看" id="fullscreenBtn">
                            <svg viewBox="0 0 24 24">
                                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                            </svg>
                        </button>
                        <button class="chart-btn" title="导出图表" id="exportBtn">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                            </svg>
                        </button>
                        <button class="chart-btn" title="设置" id="settingsBtn">
                            <svg viewBox="0 0 24 24">
                                <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 图表容器 -->
            <div class="chart-container" id="mainChart">
                <!-- 数据流网格背景 -->
                <div class="dataflow-grid"></div>
                <!-- 图表加载状态 -->
                <div class="chart-loading" id="chartLoading">
                    <div class="loading-pulse"></div>
                    <div>加载图表数据中...</div>
                </div>
                <!-- Plotly图表将在此渲染 -->
            </div>
        </main>
    </div>

    <script src="/static/js/chart-enhancer.js?v=20260414"></script>
    <script src="/static/js/data-flow.js?v=20260414"></script>
    <script src="/static/js/app.js?v=20260426"></script>
    <script>
        document.getElementById('updateTime').textContent = '更新: ' + new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
